# Cloudflare Worker: egress relay for OmniCraft managed hosts on Daytona
# free tier (Tier 1/2). Lives on the allowlisted *.workers.dev domain
# and reverse-proxies to your real OmniCraft server, so the in-sandbox
# host's dial-back gets through Daytona's egress firewall. See
# README.md (this directory) "Free-tier relay setup".
#
# Deploy:
#   npx wrangler deploy --var UPSTREAM_URL:https://your-omnicraft-server
name = "omnicraft-daytona-relay"
main = "src/index.js"
compatibility_date = "2025-01-01"

[vars]
# The real OmniCraft server this relay forwards to. Override at deploy
# time with --var UPSTREAM_URL:... (do NOT commit a real URL here).
UPSTREAM_URL = "https://your-omnicraft-server.example.com"
