apiVersion: v1
kind: ConfigMap
metadata:
  name: omnicraft-config
  labels:
    app: omnicraft
data:
  HOST: "0.0.0.0"
  PORT: "8000"
  ARTIFACT_DIR: "/data/artifacts"
  OMNICRAFT_ADMIN_CREDENTIALS_PATH: "/data/admin-credentials"
  OMNICRAFT_AUTH_ENABLED: "1"
  OMNICRAFT_AUTH_PROVIDER: "accounts"
  OMNICRAFT_ACCOUNTS_AUTO_OPEN: "0"
