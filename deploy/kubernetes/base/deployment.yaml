apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnicraft
  labels:
    app: omnicraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omnicraft
  template:
    metadata:
      labels:
        app: omnicraft
    spec:
      containers:
        - name: omnicraft
          image: ghcr.io/omnicraft-ai/omnicraft-server:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: omnicraft-config
            - secretRef:
                name: omnicraft-secrets
          volumeMounts:
            - name: artifacts
              mountPath: /data/artifacts
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: omnicraft-artifacts
