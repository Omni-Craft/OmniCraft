apiVersion: v1
kind: Secret
metadata:
  name: omnicraft-secrets
  labels:
    app: omnicraft
type: Opaque
stringData:
  # Replace with your actual database connection string.
  DATABASE_URL: "postgresql+psycopg://omnicraft:changeme@your-db-host:5432/omnicraft"
  # Generate with: openssl rand -hex 32
  OMNICRAFT_ACCOUNTS_COOKIE_SECRET: "changeme"
