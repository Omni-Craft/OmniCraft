apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnicraft
spec:
  template:
    spec:
      serviceAccountName: omnicraft
      containers:
        - name: omnicraft
          volumeMounts:
            - name: openshell-gateway
              mountPath: /home/omnicraft/.config/openshell
              readOnly: true
            - name: server-config
              mountPath: /data/server-config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: openshell-gateway
          secret:
            secretName: openshell-gateway-config
            optional: true
        - name: server-config
          configMap:
            name: omnicraft-server-config
