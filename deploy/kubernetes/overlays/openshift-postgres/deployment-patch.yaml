apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnicraft
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: omnicraft
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
