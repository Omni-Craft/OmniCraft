---
# Patch the base server Deployment so the kubernetes sandbox provider works:
#   1. Run as the `omnicraft-server` ServiceAccount (bound by rolebinding.yaml to
#      the pods + secrets Role in role.yaml) so the launcher can manage runner
#      Pods and their per-launch token Secrets.
#   2. Mount the sandbox config.yaml and point OMNICRAFT_CONFIG at it so the
#      server parses the `sandbox: provider: kubernetes` section.
#
# NOTE: the server image must include the `kubernetes` extra
# (`pip install 'omnicraft[kubernetes]'`) for the provider to import the client.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnicraft
spec:
  template:
    spec:
      serviceAccountName: omnicraft-server
      containers:
        - name: omnicraft
          env:
            - name: OMNICRAFT_CONFIG
              value: /etc/omnicraft/config.yaml
          volumeMounts:
            - name: sandbox-config
              mountPath: /etc/omnicraft
              readOnly: true
      volumes:
        - name: sandbox-config
          configMap:
            name: omnicraft-sandbox-config
