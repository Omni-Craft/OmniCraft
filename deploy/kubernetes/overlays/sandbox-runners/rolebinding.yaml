---
# CROSS-NAMESPACE binding: this RoleBinding lives in the runner namespace
# `omnicraft-sandboxes` and grants the omnicraft-sandbox-manager Role (also in
# `omnicraft-sandboxes`) to the omnicraft-server SA, which lives in the SEPARATE
# server namespace `omnicraft`. A RoleBinding may reference a subject in another
# namespace, so the server gets runner-Pod management rights in
# `omnicraft-sandboxes` ONLY — never in its own namespace. The subject namespace
# is set explicitly (NOT injected) so the binding is unambiguous. The runner SA
# is deliberately absent — runner Pods need no API access.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: omnicraft-sandbox-manager
  namespace: omnicraft-sandboxes
  labels:
    app.kubernetes.io/name: omnicraft
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: omnicraft-sandbox-manager
subjects:
  - kind: ServiceAccount
    name: omnicraft-server
    namespace: omnicraft
