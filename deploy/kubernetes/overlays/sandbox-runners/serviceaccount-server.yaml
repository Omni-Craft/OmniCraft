---
# RBAC for the kubernetes sandbox provider (on-demand runner Pods).
#
# TWO-NAMESPACE, LEAST-BLAST-RADIUS DESIGN: the server, its DB/PVC and its
# Secrets live in `omnicraft`; the runner Pods live in a SEPARATE
# `omnicraft-sandboxes` namespace. The server SA's pods create/get/delete +
# secrets create/delete rights are scoped (via a Role + RoleBinding) to
# `omnicraft-sandboxes` ONLY — so a compromised server can manage RUNNER Pods but
# CANNOT delete the server/DB Pods, read the server's Secrets, nor (because
# there is no pods/exec grant) execute commands inside any Pod.
#
#   omnicraft-server  — the OmniCraft server runs as this SA (this file; lives in
#                      `omnicraft`). deployment-patch.yaml sets
#                      serviceAccountName: omnicraft-server. The launcher uses its
#                      in-cluster token to manage runner Pods + their token
#                      Secrets in `omnicraft-sandboxes`.
#   omnicraft-runner  — the runner Pods run as this SA (serviceaccount-runner.yaml,
#                      lives in `omnicraft-sandboxes`); it has NO API rights.
#
# Role (role.yaml) + RoleBinding (rolebinding.yaml) live in `omnicraft-sandboxes`;
# the RoleBinding subject is the omnicraft-server SA in `omnicraft` (a
# cross-namespace binding — see rolebinding.yaml). Scope is a namespaced Role
# (NOT a ClusterRole) so the grant can never reach beyond the runner namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omnicraft-server
  namespace: omnicraft
  labels:
    app.kubernetes.io/name: omnicraft
    app.kubernetes.io/component: server
