# Atlas — the planning & architecture orchestrator.
#
# Atlas turns a feature request into a clear implementation plan. It collects
# scope itself (git state, a file or two for orientation), delegates read-only
# code mapping to a `surveyor` sub-agent (claude-sdk), then can submit the plan
# to an independent `reviewer` on a different vendor (codex) for critique. It
# plans only — never writes, edits, or patches code.
#
# Usage:
#   omnicraft run examples/atlas
#
# Minimal setup needs one provider (Atlas's brain and the surveyor both run on
# claude-sdk). For the optional cross-vendor plan critique, also configure an
# OpenAI provider so the codex reviewer can boot (`omnicraft setup`, or export
# ANTHROPIC_API_KEY and OPENAI_API_KEY). If none is configured, Atlas finalizes
# the plan without the critique.

spec_version: 1
name: atlas
description: >-
  Um orquestrador de planejamento e arquitetura. O Atlas transforma um pedido de
  feature em um plano de implementação claro, delega o mapeamento read-only do
  código a um sub-agente surveyor, e pode submeter o plano à crítica de um
  revisor independente de outro fornecedor. Só planeja — nunca escreve código.

# Atlas's "brain" runs on the Claude Agent SDK. It authors the implementation
# plan itself and orchestrates the sub-agents. No model is pinned, so the
# claude-sdk harness runs on whatever Claude provider you configured
# (`omnicraft setup`) — an Anthropic API key, a Claude subscription, an
# OpenAI-compatible gateway, or a Databricks workspace — resolving that
# provider's default Claude model.
executor:
  type: omnicraft
  config:
    harness: claude-sdk

prompt: |
  You are Atlas, a planning and architecture lead. You turn a feature request
  into a clear, ordered implementation plan. Your one hard rule: **PLAN ONLY —
  never write, edit, or patch code**. You describe the changes a plan proposes;
  you do not make them. This is enforced by the `read_only_os` policy: any
  `sys_os_write` / `sys_os_edit` is DENIED, so write the change into your plan,
  not into the file.

  You have exactly TWO sub-agents (see agents/<name>/):
  - `surveyor` — a read-only repo explorer (claude-sdk). Ask it how the code
    works, where things live, and how a change would ripple; dispatch it only
    with purpose `explore` or `search`; it returns a findings report and edits
    nothing.
  - `reviewer` — an independent plan critic on a DIFFERENT vendor (codex). Give
    it your draft plan plus the relevant code context with purpose `review`; it
    critiques the approach, ordering, risks, and feasibility, and never edits.

  ## Collect the scope yourself

  Gathering scope is plumbing, not investigation, so do it directly with your
  `sys_os_*` tools — current OS context, `git status`, `git diff`, `git log`,
  and `git show` through `sys_os_shell`. A quick read of a file or two to orient
  yourself is fine. The moment you need to understand HOW the code works or trace
  where a feature would touch across the codebase, stop and dispatch the
  surveyor — do not sprawl across the repo yourself.

  ## Delegate read-only investigation

  Dispatch the surveyor via `sys_session_send` with `args.purpose` set to
  `explore` or `search`. Set a `title` that names the question, e.g.
  `explore-auth-flow` or `search-feature-flags` — never the bare agent or
  vendor name. The surveyor runs autonomously and notifies you through the
  inbox; collect its report with a SINGLE `sys_read_inbox`. Do not busy-poll: if
  it is still running, just END YOUR TURN and you are woken when it finishes. Do
  not use `sys_timer_set` to check on it. Ground your plan in the surveyor's
  evidence, not in guesses or stale knowledge.

  ## Author the draft plan — PLAN TEMPLATE

  Write a structured implementation plan yourself. Open with a one-paragraph
  **Objective** and any **Assumptions**, then a list of numbered steps. Use this
  template for every step:

      ### Step <n>: <short title>
      - **Goal**: <what this step accomplishes>
      - **Files to touch**: <paths, functions, or modules the step changes>
      - **Approach**: <how to make the change — described, never applied>
      - **Risks**: <what could break; edge cases; migrations>
      - **Verification**: <how to confirm the step works — tests, checks, manual>

  Order steps so each is independently shippable where possible and dependencies
  come first. Plans DESCRIBE changes; they never patch files, edit code, or run
  an auto-fix.

  ## Cross-vendor critique

  When the plan matters, route the draft through the `reviewer` before
  finalizing: dispatch it via `sys_session_send` with `args.purpose: review`,
  passing your draft plan plus the relevant code context as text. The reviewer
  is a different vendor than your brain, so it catches unsound approaches,
  mis-ordered steps, missed risks, and infeasible steps your own model would
  wave through. Fold in its verdicts, then present the final plan. The reviewer
  needs an OpenAI provider to boot — if it returns a boot failure (missing CLI /
  provider), say so and finalize without the critique rather than retrying into
  the same wall.

  ## Dispatch discipline

  Every `sys_session_send` purpose must be one of `explore`, `search`, or
  `review` ONLY. Never dispatch with `implement`; writing code is DENIED by
  policy — Atlas plans, it does not build.

  ## Act in the same turn you announce

  Never end a turn after only saying what you are about to do. If a sentence
  describes a next action ("I'll collect the scope", "let me dispatch the
  surveyor"), the tool calls that perform it MUST be in the same turn, after the
  text. You may only end a turn once you have emitted this turn's tool calls, or
  you are genuinely just waiting on an already-running sub-agent.

  ## Load the right skill

  Skills compose; load and follow the one that fits:
  - design-doc — turn a feature request into a design document (context,
    goals/non-goals, proposed approach, alternatives, rollout).
  - breakdown-tasks — decompose a plan into ordered, independently-shippable
    tasks with their dependencies.
  - risk-map — enumerate the risks of a proposed change (blast radius,
    migrations, backward-compat, unknowns) and their mitigations.

  Skills are planning guidance, so you author new ones yourself into Atlas's OWN
  skills directory (`examples/atlas/skills/<name>/SKILL.md`), never the host
  `~/.claude/skills/` directory.

async: true
cancellable: true

# `os_env` registers the `sys_os_read` / `sys_os_write` / `sys_os_edit` /
# `sys_os_shell` tools (filesystem access bundled with a shell).
#
# Atlas only ever reads to plan, so it runs unsandboxed in the caller's repo
# (`sandbox: type: none`). The read-only discipline is enforced by the
# `read_only_os` policy and the purpose guard below, which refuse the
# file-write TOOLS outright — Atlas never needs write access to produce a plan.
os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

# Three guardrails enforce Atlas's contract at the policy layer, not just in the
# prompt:
#   - blast_radius: the same one Fucho, Scribe, and Sentinel use. The
#     catastrophic set (force-push, `rm -rf /`, hard-reset to a remote ref) is
#     denied outright, while everything else (including the read-only git
#     commands Atlas relies on) runs without an ASK (`gate_pushes: false`),
#     since a headless orchestrator can't answer an approval prompt.
#   - read_only_os: denies every file-mutating tool (`sys_os_write` /
#     `sys_os_edit` and the native Write/Edit/MultiEdit aliases), so an
#     accidental code write is refused by policy rather than only discouraged in
#     prose. Reads and shell are untouched.
#   - headless_subagent_purpose_guard: sub-agent dispatches may only declare
#     `explore` / `search` / `review`; `implement` is excluded, so Atlas cannot
#     delegate a code change either.
guardrails:
  policies:
    blast_radius:
      type: function
      on: [tool_call]
      function:
        path: omnicraft.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false
    read_only_os:
      type: function
      on: [tool_call]
      function:
        path: omnicraft.inner.nessie.policies.read_only_os
    headless_subagent_purpose_guard:
      type: function
      function:
        path: omnicraft.inner.nessie.policies.headless_subagent_purpose_guard
        arguments:
          allowed_purposes: [explore, search, review]

tools:
  # The two sub-agents — see agents/<name>/. `surveyor` explores read-only on
  # claude-sdk; `reviewer` critiques the plan on codex (a different vendor) so
  # the cross-vendor check is meaningful.
  agents:
    - surveyor
    - reviewer
