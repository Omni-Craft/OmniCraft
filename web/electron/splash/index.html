<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>OmniCraft</title>
    <style>
      /* The splash covers the black gap while the local server boots. It is a
         frameless transparent window, so the rounded card is drawn here. */
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
      }
      .card {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #0b0b0c;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        -webkit-app-region: drag; /* let the user move the splash if it lingers */
      }
      /* One 288x288 cell of the sheet, scaled down to fit the splash. The frame
         and row are driven from JS via background-position. */
      #fucho {
        width: 288px;
        height: 288px;
        transform: scale(0.62);
        transform-origin: center;
        background-repeat: no-repeat;
        image-rendering: auto;
      }
      .caption {
        margin-top: -34px; /* pull up under the scaled sprite */
        font:
          500 13px/1.3 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: rgba(255, 255, 255, 0.72);
        letter-spacing: 0.2px;
      }
      .dots::after {
        content: "";
        animation: dots 1.4s steps(4, end) infinite;
      }
      @keyframes dots {
        0% {
          content: "";
        }
        25% {
          content: "·";
        }
        50% {
          content: "··";
        }
        75% {
          content: "···";
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="fucho"></div>
      <div class="caption">Preparando o OmniCraft<span class="dots"></span></div>
    </div>
    <script>
      // Each cell is 288x288; a state is one row of a sheet, played left→right.
      // The "trabalhando" sequence deliberately crosses both sheets (v1 has
      // codando/nadar/frente/pensando/idle; v2 has nadar_dir/ataque), then
      // rests on idle, looping until the shell closes the splash.
      const CELL = 288;
      const V1 = "fucho-sheet.webp";
      const V2 = "fucho-v2-sheet.webp";
      const SEQUENCE = [
        { sheet: V1, row: 7, frames: 7, ms: 150 }, // codando
        { sheet: V2, row: 1, frames: 8, ms: 200 }, // nadar_dir
        { sheet: V1, row: 2, frames: 8, ms: 120 }, // nadar
        { sheet: V2, row: 3, frames: 8, ms: 150 }, // ataque
        { sheet: V1, row: 1, frames: 7, ms: 140 }, // frente
        { sheet: V1, row: 6, frames: 6, ms: 220 }, // pensando
        { sheet: V1, row: 0, frames: 3, ms: 600, loop: true }, // idle (rest)
      ];

      const el = document.getElementById("fucho");
      let step = 0;
      let frame = 0;
      let timer = null;

      function paint() {
        const s = SEQUENCE[step];
        el.style.backgroundImage = `url(${s.sheet})`;
        el.style.backgroundPosition = `${-frame * CELL}px ${-s.row * CELL}px`;
      }

      function tick() {
        const s = SEQUENCE[step];
        paint();
        frame += 1;
        if (frame >= s.frames) {
          frame = 0;
          if (!s.loop && step < SEQUENCE.length - 1) step += 1; // advance state
        }
        // Re-arm at the current state's own pace (states differ in speed).
        timer = setTimeout(tick, SEQUENCE[step].ms);
      }

      // Preload both sheets so the first swap between them doesn't flash blank.
      let pending = 2;
      const start = () => {
        pending -= 1;
        if (pending === 0) tick();
      };
      for (const src of [V1, V2]) {
        const img = new Image();
        img.onload = start;
        img.onerror = start; // never hang the splash on a missing asset
        img.src = src;
      }
    </script>
  </body>
</html>
